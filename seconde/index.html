<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seconde - MatheuxMed</title>
    <link rel="stylesheet" href="/mathyxo/css/style.css">
</head>
<body>
    <div id="header-container"></div>
    <div id="nav-container"></div>

    <main class="container">
        <div id="page-header-container"></div>
        <div id="lessons-container"></div>
        <div id="tips-container"></div>
        <div id="back-button-container"></div>
    </main>

    <div id="footer-container"></div>

    <script src="/mathyxo/js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Page header
            document.getElementById('page-header-container').innerHTML = 
                renderPageHeader('📘 Mathématiques - Seconde', 'Explorez les fondamentaux des mathématiques avec des leçons interactives');

            // Lessons
            let lessonsHTML = '<section class="lessons-grid">';
            lessonsHTML += renderLessonCard('1️⃣', 'Équations et Inéquations', 'Résolvez des équations linéaires et quadratiques. Apprenez les méthodes de factorisation et d\'analyse des signes.', '/mathyxo/seconde/equations.html');
            lessonsHTML += renderLessonCard('2️⃣', 'Fonctions et Graphiques', 'Découvrez les propriétés des fonctions, les transformations graphiques et l\'étude du domaine et de la plage.', '/mathyxo/seconde/fonctions.html');
            lessonsHTML += renderLessonCard('3️⃣', 'Fonctions du Second Degré', 'Maîtrisez les paraboles, calculez le sommet et trouvez les racines avec la formule du discriminant.', '/mathyxo/seconde/second-degre.html');
            lessonsHTML += renderLessonCard('4️⃣', 'Vecteurs et Géométrie Plane', 'Comprenez les opérations vectorielles, la colinéarité et les applications en géométrie analytique.', '/mathyxo/seconde/vecteurs.html');
            lessonsHTML += renderLessonCard('5️⃣', 'Géométrie: Droites et Cercles', 'Explorez les équations des droites et des cercles, les intersections et les propriétés géométriques.', '/mathyxo/seconde/droites-cercles.html');
            lessonsHTML += renderLessonCard('6️⃣', 'Statistiques Descriptives', 'Analysez les données avec les mesures de tendance centrale, la variance et les représentations graphiques.', '/mathyxo/seconde/statistiques.html');
            lessonsHTML += renderLessonCard('7️⃣', 'Probabilités Simples', 'Initiez-vous aux probabilités, aux événements et aux calculs de chances à l\'aide d\'exemples concrets.', '/mathyxo/seconde/probabilites.html');
            lessonsHTML += renderLessonCard('8️⃣', 'Transformations Géométriques', 'Étudiez les translations, rotations, symétries et homothéties dans le plan.', '/mathyxo/seconde/transformations.html');
            lessonsHTML += '</section>';
            document.getElementById('lessons-container').innerHTML = lessonsHTML;

            // Tips
            const tips = [
                'Suivez les leçons dans l\'ordre proposé',
                'Explorez les outils interactifs pour mieux comprendre',
                'Répondez aux quizzes pour valider vos acquis',
                'Pratiquez régulièrement avec les exercices',
                'Revisitez les concepts difficiles autant de fois que nécessaire'
            ];
            document.getElementById('tips-container').innerHTML = renderTipsSection(tips);

            // Back button
            document.getElementById('back-button-container').innerHTML = renderBackButton();
        });
    </script>
</body>
</html>
