<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatheuxMed - Mathématiques Lycée Marocain</title>
    <link rel="stylesheet" href="/mathyxo/css/style.css">
</head>
<body>
    <div id="header-container"></div>
    <div id="nav-container"></div>

    <main class="container">
        <div id="hero-container"></div>
        <div id="levels-container"></div>
        <div id="features-container"></div>
        <div id="cta-container"></div>
    </main>

    <div id="footer-container"></div>

    <script src="/mathyxo/js/components.js"></script>
    <!-- Auth System -->
    <script type="module" src="/mathyxo/js/auth.js"></script>
    <script>
        // Inject homepage content
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('hero-container').innerHTML = renderHero();
            document.getElementById('levels-container').innerHTML = renderLevelCards();
            document.getElementById('features-container').innerHTML = renderFeatures();
            document.getElementById('cta-container').innerHTML = renderCTA();
        });
    </script>
</body>
</html>
