<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Première - MatheuxMed</title>
    <link rel="stylesheet" href="/mathyxo/css/style.css">
</head>
<body>
    <div id="header-container"></div>
    <div id="nav-container"></div>

    <main class="container">
        <div id="page-header-container"></div>
        <div id="lessons-container"></div>
        <div id="tips-container"></div>
        <div id="back-button-container"></div>
    </main>

    <div id="footer-container"></div>

    <script src="/mathyxo/js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Page header
            document.getElementById('page-header-container').innerHTML = 
                renderPageHeader('📗 Mathématiques - Première', 'Approfondissez vos connaissances avec des sujets avancés et stimulants');

            // Lessons
            let lessonsHTML = '<section class="lessons-grid">';
            lessonsHTML += renderLessonCard('1️⃣', 'Polynômes et Fractions Rationnelles', 'Divisez les polynômes, trouvez les racines et analysez les fractions rationnelles.', '/mathyxo/premiere/polynomes.html');
            lessonsHTML += renderLessonCard('2️⃣', 'Fonctions Exponentielles', 'Comprenez la croissance exponentielle avec la base e et les applications réelles.', '/mathyxo/premiere/exponentielles.html');
            lessonsHTML += renderLessonCard('3️⃣', 'Logarithme Népérien', 'Explorez les propriétés du logarithme et ses relations avec l\'exponentielle.', '/mathyxo/premiere/logarithmes.html');
            lessonsHTML += renderLessonCard('4️⃣', 'Suites Arithmétiques et Géométriques', 'Étudiez les suites, leurs limites et les formules de somme.', '/mathyxo/premiere/suites.html');
            lessonsHTML += renderLessonCard('5️⃣', 'Trigonométrie Avancée', 'Maîtrisez les fonctions trigonométriques, les équations et les identités.', '/mathyxo/premiere/trigonometrie.html');
            lessonsHTML += renderLessonCard('6️⃣', 'Produit Scalaire', 'Comprenez le produit scalaire et ses applications en géométrie et physique.', '/mathyxo/premiere/produit-scalaire.html');
            lessonsHTML += renderLessonCard('7️⃣', 'Géométrie 3D et Vecteurs', 'Explorez l\'espace tridimensionnel, les plans et les droites en 3D.', '/mathyxo/premiere/geometrie-3d.html');
            lessonsHTML += renderLessonCard('8️⃣', 'Probabilités Conditionnelles', 'Apprenez les probabilités conditionnelles, la formule de Bayes et les applications.', '/mathyxo/premiere/probabilites-cond.html');
            lessonsHTML += renderLessonCard('9️⃣', 'Combinatoire', 'Maîtrisez les permutations, combinaisons et arrangements.', '/mathyxo/premiere/combinatoire.html');
            lessonsHTML += '</section>';
            document.getElementById('lessons-container').innerHTML = lessonsHTML;

            // Tips
            const tips = ['Les leçons de Première approfondissent les concepts de Seconde', 'Assurez-vous de bien maîtriser les suites et la trigonométrie', 'Avant d\'aborder le calcul en Terminale'];
            document.getElementById('tips-container').innerHTML = `
                <section style="text-align: center; padding: 40px 20px; background: #f0f0f0; border-radius: 10px;">
                    <h2>📈 Progression Recommandée</h2>
                    <p style="color: #666; max-width: 700px; margin: 20px auto;">
                        Les leçons de Première approfondissent les concepts de Seconde. Assurez-vous de bien maîtriser 
                        les suites et la trigonométrie avant d'aborder le calcul en Terminale.
                    </p>
                </section>
            `;

            // Back button
            document.getElementById('back-button-container').innerHTML = renderBackButton();
        });
    </script>
</body>
</html>
