<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminale - MatheuxMed</title>
    <link rel="stylesheet" href="/mathyxo/css/style.css">
</head>
<body>
    <div id="header-container"></div>
    <div id="nav-container"></div>

    <main class="container">
        <div id="page-header-container"></div>
        <div id="lessons-container"></div>
        <div id="tips-container"></div>
        <div id="back-button-container"></div>
    </main>

    <div id="footer-container"></div>

    <script src="/mathyxo/js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Page header
            document.getElementById('page-header-container').innerHTML = 
                renderPageHeader('📕 Mathématiques - Terminale', 'Maîtrisez les concepts avancés pour réussir vos examens');

            // Lessons
            let lessonsHTML = '<section class="lessons-grid">';
            lessonsHTML += renderLessonCard('1️⃣', 'Limites et Continuité', 'Étudiez les limites de fonctions et la continuité sur un intervalle.', '/mathyxo/terminale/limites.html');
            lessonsHTML += renderLessonCard('2️⃣', 'Dérivation', 'Apprenez à calculer les dérivées et à comprendre leur signification géométrique.', '/mathyxo/terminale/derivees.html');
            lessonsHTML += renderLessonCard('3️⃣', 'Étude de Fonctions', 'Analysez complètement des fonctions: monotonie, extrema et représentation graphique.', '/mathyxo/terminale/etude-fonctions.html');
            lessonsHTML += renderLessonCard('4️⃣', 'Intégration', 'Découvrez les primitives, les intégrales définies et leurs applications.', '/mathyxo/terminale/integrales.html');
            lessonsHTML += renderLessonCard('5️⃣', 'Nombres Complexes - Forme Algébrique', 'Explorez les opérations sur les nombres complexes et le plan complexe.', '/mathyxo/terminale/complexes-algebrique.html');
            lessonsHTML += renderLessonCard('6️⃣', 'Nombres Complexes - Forme Trigonométrique', 'Maîtrisez la forme exponentielle et les puissances de nombres complexes.', '/mathyxo/terminale/complexes-trigo.html');
            lessonsHTML += renderLessonCard('7️⃣', 'Suites et Limites', 'Étudiez la convergence des suites et les limites infinies.', '/mathyxo/terminale/suites-limites.html');
            lessonsHTML += renderLessonCard('8️⃣', 'Matrices et Systèmes Linéaires', 'Apprenez les opérations matricielles et la résolution de systèmes.', '/mathyxo/terminale/matrices.html');
            lessonsHTML += renderLessonCard('9️⃣', 'Variables Aléatoires et Lois', 'Comprenez les variables aléatoires, les lois binomiale et normale.', '/mathyxo/terminale/variables-aleatoires.html');
            lessonsHTML += renderLessonCard('🔟', 'Statistique Inférentielle', 'Explorez l\'estimation, les intervalles de confiance et les tests statistiques.', '/mathyxo/terminale/statistique-inf.html');
            lessonsHTML += '</section>';
            document.getElementById('lessons-container').innerHTML = lessonsHTML;

            // Tips
            document.getElementById('tips-container').innerHTML = `
                <section style="text-align: center; padding: 40px 20px; background: #f0f0f0; border-radius: 10px;">
                    <h2>🎯 Important pour la Terminale</h2>
                    <ul style="list-style: none; padding: 0; color: #666; text-align: left; max-width: 700px; margin: 20px auto;">
                        <li>✅ Dominez la dérivation et l'intégration - concepts clés</li>
                        <li>✅ Comprenez bien les nombres complexes</li>
                        <li>✅ Pratiquez l'étude complète de fonctions</li>
                        <li>✅ Maîtrisez les probabilités et la statistique</li>
                        <li>✅ Révisez les formules clés régulièrement</li>
                    </ul>
                </section>
            `;

            // Back button
            document.getElementById('back-button-container').innerHTML = renderBackButton();
        });
    </script>
</body>
</html>
